name: Build and Push Docker Image

on: 
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrts.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and Push Backend Docker Image
        run: |
          docker build -t  harshapillari03/backend-image:latest ./backend
          docker push harshapillari03/backend-image:latest

      - name: Build and Push Frontend Docker Image
        run: |
          docker build -t harshapillari03/frontend-image:latest ./frontend
          docker push harshapillari03/frontend-image:latest
